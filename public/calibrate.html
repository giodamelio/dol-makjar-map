<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dol-Makjar Map Calibration</title>
<link rel="icon" type="image/png" href="/icon.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; background: #1a1a1a; color: #ddd; }

#sidebar {
  width: 320px; min-width: 320px; background: #222; border-right: 1px solid #444;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar h2 { padding: 12px; font-size: 14px; border-bottom: 1px solid #444; }

#mode-tabs {
  display: flex; border-bottom: 1px solid #444;
}
#mode-tabs button {
  flex: 1; padding: 8px; background: #333; border: none; color: #aaa; cursor: pointer; font-size: 13px;
}
#mode-tabs button.active { background: #444; color: #fff; }

#place-list {
  flex: 1; overflow-y: auto; font-size: 13px;
}
.district-group { border-bottom: 1px solid #333; }
.district-header {
  padding: 6px 12px; background: #2a2a2a; font-weight: bold; font-size: 12px;
  color: #888; text-transform: uppercase; letter-spacing: 0.5px;
}
.district-header.has-polygon { color: #6a6; }
.place-item {
  padding: 4px 12px 4px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
}
.place-item:hover { background: #333; }
.place-item.active { background: #335; color: #8af; }
.place-item.done { color: #6a6; }
.place-item .coords { font-size: 11px; color: #666; }

.district-row {
  padding: 4px 12px; display: flex; justify-content: space-between; align-items: center;
}
.district-row .name { flex: 1; }
.district-row .info { font-size: 11px; color: #666; margin-right: 8px; }
.district-row.done .name { color: #6a6; }
.district-row.editing { background: #335; }
.district-row.editing .name { color: #8af; }
.btn-sm {
  padding: 2px 8px; background: #444; border: 1px solid #555; color: #ddd;
  cursor: pointer; border-radius: 3px; font-size: 11px;
}
.btn-sm:hover { background: #555; }
.btn-sm.btn-done { background: #363; border-color: #484; }
.btn-sm.btn-done:hover { background: #474; }
.btn-sm.btn-clear { background: #633; border-color: #844; }
.btn-sm.btn-clear:hover { background: #744; }

#controls {
  padding: 8px; border-top: 1px solid #444; display: flex; flex-direction: column; gap: 6px;
}
#controls button {
  padding: 6px 10px; background: #444; border: 1px solid #555; color: #ddd;
  cursor: pointer; border-radius: 3px; font-size: 13px;
}
#controls button:hover { background: #555; }
#controls .info { font-size: 11px; color: #888; text-align: center; }

#map-container {
  flex: 1; overflow: hidden; cursor: grab; position: relative;
}
#map-container.dragging { cursor: grabbing; }
#map-container.placing { cursor: crosshair; }
#map-container.editing { cursor: crosshair; }

#map-wrapper {
  position: absolute; transform-origin: 0 0;
}
#map-img { display: block; }

.marker {
  position: absolute; width: 20px; height: 20px; border-radius: 50%;
  background: rgba(255, 80, 80, 0.8); border: 2px solid #fff;
  transform: translate(-50%, -50%); pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold; color: #fff;
}

.poly-point {
  position: absolute; width: 14px; height: 14px; border-radius: 50%;
  background: rgba(80, 180, 255, 0.8); border: 2px solid #fff;
  transform: translate(-50%, -50%); pointer-events: auto; cursor: grab;
}
.poly-point:hover { background: rgba(255, 200, 80, 0.9); }
.poly-point.dragging-point { cursor: grabbing; background: rgba(255, 200, 80, 1); }

svg#poly-overlay {
  position: absolute; top: 0; left: 0; pointer-events: none;
}
svg#poly-overlay polygon {
  fill: rgba(80, 180, 255, 0.15); stroke: rgba(80, 180, 255, 0.7); stroke-width: 2;
}
svg#poly-overlay polygon.active-poly {
  fill: rgba(80, 180, 255, 0.25); stroke: rgba(80, 180, 255, 0.9); stroke-width: 2; stroke-dasharray: 6 3;
}
svg#poly-overlay polyline {
  fill: none; stroke: rgba(80, 180, 255, 0.7); stroke-width: 2; stroke-dasharray: 6 3;
}

/* Legend mode */
.legend-corner {
  position: absolute; width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255, 200, 80, 0.8); border: 2px solid #fff;
  transform: translate(-50%, -50%); pointer-events: auto; cursor: nwse-resize;
}
.legend-corner:hover { background: rgba(255, 255, 100, 1); }
.legend-corner.dragging-corner { background: rgba(255, 255, 100, 1); }
.legend-corner[data-corner="tr"],
.legend-corner[data-corner="bl"] { cursor: nesw-resize; }
.legend-edge {
  position: absolute; pointer-events: auto;
  background: rgba(255, 200, 80, 0.15);
}
.legend-edge:hover { background: rgba(255, 200, 80, 0.4); }
.legend-edge[data-corner="top"],
.legend-edge[data-corner="bottom"] { cursor: ns-resize; height: 6px; transform: translateY(-50%); }
.legend-edge[data-corner="left"],
.legend-edge[data-corner="right"] { cursor: ew-resize; width: 6px; transform: translateX(-50%); }
.legend-move {
  position: absolute; pointer-events: auto; cursor: move;
  background: rgba(255, 200, 80, 0.08); border: 1px solid transparent;
}
.legend-move:hover { border-color: rgba(255, 200, 80, 0.4); }

#open-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a1a; display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
#open-overlay-content {
  text-align: center; max-width: 400px;
}
#open-overlay-content h2 { margin-bottom: 12px; font-size: 20px; }
#open-overlay-content p { margin-bottom: 16px; color: #aaa; font-size: 14px; }
#open-overlay-content code { background: #333; padding: 2px 6px; border-radius: 3px; }
#btn-open-dir {
  padding: 12px 24px; background: #446; border: 1px solid #668; color: #fff;
  cursor: pointer; border-radius: 6px; font-size: 16px;
}
#btn-open-dir:hover { background: #558; }
</style>
</head>
<body>

<div id="open-overlay">
  <div id="open-overlay-content">
    <h2>Calibration Tool</h2>
    <p>Open a map version directory containing <code>map.jpg</code> and <code>places.json</code>.</p>
    <button id="btn-open-dir">Open Map Directory</button>
    <p id="open-error" style="color: #f88; display: none;"></p>
  </div>
</div>

<div id="sidebar" style="display: none;">
  <h2 id="sidebar-title">Calibration Tool</h2>
  <div id="mode-tabs">
    <button class="active" data-mode="point">Points</button>
    <button data-mode="polygon">Polygons</button>
    <button data-mode="legend">Legend</button>
  </div>
  <div id="place-list"></div>
  <div id="controls">
    <div class="info" id="status">Click map to place marker</div>
    <button id="btn-undo">Undo Last</button>
    <button id="btn-save">Save</button>
    <button id="btn-copy">Copy JSON</button>
    <button id="btn-load">Reload from disk</button>
  </div>
</div>

<div id="map-container" style="display: none;">
  <div id="map-wrapper">
    <img id="map-img" draggable="false">
    <svg id="poly-overlay"></svg>
  </div>
</div>

<script>
let IMG_W, IMG_H;
let dirHandle = null;
let data = null;
let mode = 'point'; // 'point' or 'polygon'
let currentPlaceIdx = 0;
let allPlaces = [];

// Polygon editing state
let editingDistrictIdx = -1; // -1 means not editing any district
let polyPoints = [];

// Legend state — entries stored directly in data.legend as { type, di, id?, box: [x1,y1,x2,y2] }
let selectedLegendIdx = -1;
let legendDragging = null; // { corner: 'tl'|'tr'|'bl'|'br'|'move', startMouse: [x,y], startBox: [x1,y1,x2,y2] }

function loadLegendFromData() {
  if (!data.legend) { data.legend = []; return; }
  // Convert old panel format (has 'districts' key) to individual boxes
  if (data.legend.length > 0 && data.legend[0].districts) {
    const boxes = [];
    data.legend.forEach(panel => {
      let lineIdx = 0;
      panel.districts.forEach(di => {
        const d = data.districts[di];
        const y1 = panel.y + lineIdx * panel.lineH;
        boxes.push({ type: 'district', di, box: [panel.x, y1, panel.x + panel.w, y1 + panel.lineH] });
        lineIdx++;
        d.places.forEach(p => {
          const py = panel.y + lineIdx * panel.lineH;
          boxes.push({ type: 'place', di, id: p.id, box: [panel.x, py, panel.x + panel.w, py + panel.lineH] });
          lineIdx++;
        });
      });
    });
    data.legend = boxes;
  }
}

function legendEntryLabel(entry) {
  if (entry.type === 'district') return data.districts[entry.di].name;
  const d = data.districts[entry.di];
  const p = d.places.find(pl => pl.id === entry.id);
  return p ? `${p.id}. ${p.name}` : '?';
}

// Pan/zoom state
let scale = 1, panX = 0, panY = 0;
let isDragging = false, dragStartX, dragStartY, panStartX, panStartY;

// Poly point drag state
let draggingPointIdx = -1;
let isDraggingPoint = false;

const container = document.getElementById('map-container');
const wrapper = document.getElementById('map-wrapper');
const img = document.getElementById('map-img');
const polyOverlay = document.getElementById('poly-overlay');
const placeList = document.getElementById('place-list');
const statusEl = document.getElementById('status');

async function openDirectory(handle) {
  dirHandle = handle || await window.showDirectoryPicker();
  const errorEl = document.getElementById('open-error');

  try {
    // Load image
    const imgFileHandle = await dirHandle.getFileHandle('map.jpg');
    const imgFile = await imgFileHandle.getFile();
    img.src = URL.createObjectURL(imgFile);

    // Load places.json
    const jsonFileHandle = await dirHandle.getFileHandle('places.json');
    const jsonFile = await jsonFileHandle.getFile();
    data = JSON.parse(await jsonFile.text());

    buildFlatList();
    loadLegendFromData();

    // Show the UI
    document.getElementById('open-overlay').style.display = 'none';
    document.getElementById('sidebar').style.display = '';
    document.getElementById('map-container').style.display = '';
    document.getElementById('sidebar-title').textContent = `Calibration — ${dirHandle.name}`;

    renderSidebar();
    updateStatus();
  } catch (err) {
    if (err.name === 'AbortError') return; // user cancelled picker
    errorEl.textContent = `Error: ${err.message}`;
    errorEl.style.display = '';
  }
}

async function saveData() {
  if (!dirHandle) return;
  if (isEditing()) stopEditing(); // save polygon first
  const fileHandle = await dirHandle.getFileHandle('places.json', { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify(data, null, 2) + '\n');
  await writable.close();
  statusEl.textContent = 'Saved to disk!';
  setTimeout(updateStatus, 1500);
}

async function reloadFromDisk() {
  if (!dirHandle) return;
  const jsonFileHandle = await dirHandle.getFileHandle('places.json');
  const jsonFile = await jsonFileHandle.getFile();
  data = JSON.parse(await jsonFile.text());
  buildFlatList();
  loadLegendFromData();
  editingDistrictIdx = -1;
  polyPoints = [];
  container.classList.remove('editing');
  currentPlaceIdx = allPlaces.findIndex(a => a.place.x === undefined);
  if (currentPlaceIdx === -1) currentPlaceIdx = allPlaces.length;
  renderSidebar();
  renderOverlays();
  statusEl.textContent = 'Reloaded from disk';
  setTimeout(updateStatus, 1500);
}

document.getElementById('btn-open-dir').addEventListener('click', () => openDirectory());

function buildFlatList() {
  allPlaces = [];
  data.districts.forEach((d, di) => {
    d.places.forEach((p, pi) => {
      allPlaces.push({ districtIdx: di, placeIdx: pi, place: p });
    });
  });
}

function isEditing() {
  return mode === 'polygon' && editingDistrictIdx >= 0;
}

function startEditing(di) {
  editingDistrictIdx = di;
  const d = data.districts[di];
  polyPoints = d.polygon ? d.polygon.map(p => p.slice()) : [];
  container.classList.add('editing');
  renderSidebar();
  renderOverlays();
  updateStatus();
}

function stopEditing() {
  if (editingDistrictIdx >= 0) {
    // Save the polygon
    if (polyPoints.length >= 3) {
      data.districts[editingDistrictIdx].polygon = polyPoints.map(p => p.slice());
    }
  }
  editingDistrictIdx = -1;
  polyPoints = [];
  container.classList.remove('editing');
  renderSidebar();
  renderOverlays();
  updateStatus();
}

function clearPolygon(di) {
  delete data.districts[di].polygon;
  if (editingDistrictIdx === di) {
    polyPoints = [];
  }
  renderSidebar();
  renderOverlays();
  updateStatus();
}

function renderSidebar() {
  placeList.innerHTML = '';
  if (mode === 'point') {
    data.districts.forEach((d, di) => {
      const group = document.createElement('div');
      group.className = 'district-group';
      const header = document.createElement('div');
      header.className = 'district-header' + (d.polygon ? ' has-polygon' : '');
      header.textContent = d.name;
      group.appendChild(header);
      d.places.forEach((p, pi) => {
        const item = document.createElement('div');
        item.className = 'place-item';
        const flatIdx = allPlaces.findIndex(a => a.place === p);
        if (flatIdx === currentPlaceIdx) item.classList.add('active');
        if (p.x !== undefined) item.classList.add('done');
        const name = document.createElement('span');
        name.textContent = `${p.id}. ${p.name}`;
        item.appendChild(name);
        if (p.x !== undefined) {
          const coords = document.createElement('span');
          coords.className = 'coords';
          coords.textContent = `${p.x.toFixed(4)}, ${p.y.toFixed(4)}`;
          item.appendChild(coords);
        }
        item.addEventListener('click', () => {
          currentPlaceIdx = flatIdx;
          renderSidebar();
          updateStatus();
        });
        group.appendChild(item);
      });
      placeList.appendChild(group);
    });
    const active = placeList.querySelector('.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  } else if (mode === 'polygon') {
    // Polygon mode - show districts with edit/done buttons
    data.districts.forEach((d, di) => {
      const row = document.createElement('div');
      row.className = 'district-row';
      if (d.polygon) row.classList.add('done');
      if (editingDistrictIdx === di) row.classList.add('editing');

      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = d.name;
      row.appendChild(name);

      if (editingDistrictIdx === di) {
        // Currently editing this one
        const info = document.createElement('span');
        info.className = 'info';
        info.textContent = `${polyPoints.length} pts`;
        row.appendChild(info);

        const doneBtn = document.createElement('button');
        doneBtn.className = 'btn-sm btn-done';
        doneBtn.textContent = 'Done';
        doneBtn.addEventListener('click', (e) => { e.stopPropagation(); stopEditing(); });
        row.appendChild(doneBtn);
      } else if (editingDistrictIdx < 0) {
        // Not editing anything — show edit/clear buttons
        if (d.polygon) {
          const info = document.createElement('span');
          info.className = 'info';
          info.textContent = `${d.polygon.length} pts`;
          row.appendChild(info);
        }

        const editBtn = document.createElement('button');
        editBtn.className = 'btn-sm';
        editBtn.textContent = d.polygon ? 'Edit' : 'Draw';
        editBtn.addEventListener('click', (e) => { e.stopPropagation(); startEditing(di); });
        row.appendChild(editBtn);

        if (d.polygon) {
          const clearBtn = document.createElement('button');
          clearBtn.className = 'btn-sm btn-clear';
          clearBtn.textContent = 'X';
          clearBtn.style.marginLeft = '4px';
          clearBtn.addEventListener('click', (e) => { e.stopPropagation(); clearPolygon(di); });
          row.appendChild(clearBtn);
        }
      }

      placeList.appendChild(row);
    });
  } else if (mode === 'legend') {
    let lastDi = -1;
    data.legend.forEach((entry, idx) => {
      // District group header when district changes
      if (entry.di !== lastDi) {
        lastDi = entry.di;
        const header = document.createElement('div');
        header.className = 'district-header';
        header.textContent = data.districts[entry.di].name;
        placeList.appendChild(header);
      }
      const item = document.createElement('div');
      item.className = 'place-item';
      if (idx === selectedLegendIdx) item.classList.add('active');
      if (entry.box) item.classList.add('done');
      if (entry.type === 'district') item.style.fontWeight = 'bold';
      const name = document.createElement('span');
      name.textContent = legendEntryLabel(entry);
      item.appendChild(name);
      if (entry.box) {
        const coords = document.createElement('span');
        coords.className = 'coords';
        coords.textContent = `${entry.box[0].toFixed(3)},${entry.box[1].toFixed(3)}`;
        item.appendChild(coords);
      }
      item.addEventListener('click', () => {
        selectedLegendIdx = idx;
        renderSidebar();
        renderOverlays();
        updateStatus();
      });
      placeList.appendChild(item);
    });
    const active = placeList.querySelector('.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }
}

function updateStatus() {
  // Show crosshair when placing points
  container.classList.toggle('placing', mode === 'point' && currentPlaceIdx < allPlaces.length);

  if (mode === 'point') {
    if (currentPlaceIdx < allPlaces.length) {
      const p = allPlaces[currentPlaceIdx].place;
      statusEl.textContent = `Next: #${p.id} ${p.name}`;
    } else {
      statusEl.textContent = 'All places marked!';
    }
  } else if (isEditing()) {
    const d = data.districts[editingDistrictIdx];
    statusEl.textContent = `Editing ${d.name}: ${polyPoints.length} pts — click to add, drag to move`;
  } else if (mode === 'legend') {
    if (selectedLegendIdx >= 0) {
      const entry = data.legend[selectedLegendIdx];
      statusEl.textContent = entry.box
        ? `Drag corners to resize, drag box to move`
        : `Click map to place box`;
    } else {
      statusEl.textContent = 'Select an entry from the list';
    }
  } else {
    statusEl.textContent = 'Click "Draw" to start a polygon';
  }
}

// Transform helpers
function applyTransform() {
  wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  polyOverlay.setAttribute('width', IMG_W);
  polyOverlay.setAttribute('height', IMG_H);
}

function screenToImage(sx, sy) {
  const rect = container.getBoundingClientRect();
  const x = (sx - rect.left - panX) / scale;
  const y = (sy - rect.top - panY) / scale;
  return [x / IMG_W, y / IMG_H];
}

// Fit image on load — also derives IMG_W/IMG_H from the loaded image
img.onload = () => {
  IMG_W = img.naturalWidth;
  IMG_H = img.naturalHeight;
  const rect = container.getBoundingClientRect();
  scale = Math.min(rect.width / IMG_W, rect.height / IMG_H);
  panX = (rect.width - IMG_W * scale) / 2;
  panY = (rect.height - IMG_H * scale) / 2;
  applyTransform();
  renderOverlays();
};

// Pan & point dragging
container.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;

  // Check if mousedown is on a poly-point dot (only when editing)
  if (isEditing() && e.target.classList.contains('poly-point')) {
    const idx = parseInt(e.target.dataset.idx, 10);
    if (!isNaN(idx)) {
      isDraggingPoint = true;
      draggingPointIdx = idx;
      e.target.classList.add('dragging-point');
      e.preventDefault();
      return;
    }
  }

  // Legend corner or move handle drag
  if (mode === 'legend' && selectedLegendIdx >= 0) {
    const entry = data.legend[selectedLegendIdx];
    if (entry && entry.box) {
      if (e.target.classList.contains('legend-corner')) {
        legendDragging = {
          corner: e.target.dataset.corner,
          startMouse: screenToImage(e.clientX, e.clientY),
          startBox: entry.box.slice()
        };
        e.target.classList.add('dragging-corner');
        e.preventDefault();
        return;
      }
      if (e.target.classList.contains('legend-edge')) {
        legendDragging = {
          corner: e.target.dataset.corner,
          startMouse: screenToImage(e.clientX, e.clientY),
          startBox: entry.box.slice()
        };
        e.preventDefault();
        return;
      }
      if (e.target.classList.contains('legend-move') || e.target.dataset.action === 'move') {
        legendDragging = {
          corner: 'move',
          startMouse: screenToImage(e.clientX, e.clientY),
          startBox: entry.box.slice()
        };
        e.preventDefault();
        return;
      }
    }
  }

  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
  container.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
  if (legendDragging && selectedLegendIdx >= 0) {
    const [mx, my] = screenToImage(e.clientX, e.clientY);
    const entry = data.legend[selectedLegendIdx];
    const sb = legendDragging.startBox;
    const dx = mx - legendDragging.startMouse[0];
    const dy = my - legendDragging.startMouse[1];
    if (legendDragging.corner === 'move') {
      entry.box = [sb[0] + dx, sb[1] + dy, sb[2] + dx, sb[3] + dy];
    } else {
      entry.box = sb.slice();
      const c = legendDragging.corner;
      if (c === 'tl') { entry.box[0] = sb[0] + dx; entry.box[1] = sb[1] + dy; }
      else if (c === 'tr') { entry.box[2] = sb[2] + dx; entry.box[1] = sb[1] + dy; }
      else if (c === 'bl') { entry.box[0] = sb[0] + dx; entry.box[3] = sb[3] + dy; }
      else if (c === 'br') { entry.box[2] = sb[2] + dx; entry.box[3] = sb[3] + dy; }
      else if (c === 'top') { entry.box[1] = sb[1] + dy; }
      else if (c === 'bottom') { entry.box[3] = sb[3] + dy; }
      else if (c === 'left') { entry.box[0] = sb[0] + dx; }
      else if (c === 'right') { entry.box[2] = sb[2] + dx; }
    }
    renderOverlays();
    return;
  }
  if (isDraggingPoint) {
    const [rx, ry] = screenToImage(e.clientX, e.clientY);
    polyPoints[draggingPointIdx] = [
      Math.max(0, Math.min(1, rx)),
      Math.max(0, Math.min(1, ry))
    ];
    renderOverlays();
    return;
  }
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
});

window.addEventListener('mouseup', (e) => {
  if (legendDragging) {
    legendDragging = null;
    renderOverlays();
    renderSidebar();
    return;
  }
  if (isDraggingPoint) {
    isDraggingPoint = false;
    draggingPointIdx = -1;
    renderOverlays();
    updateStatus();
    return;
  }
  if (!isDragging) return;
  const dx = Math.abs(e.clientX - dragStartX);
  const dy = Math.abs(e.clientY - dragStartY);
  isDragging = false;
  container.classList.remove('dragging');
  if (dx < 4 && dy < 4) {
    handleMapClick(e);
  }
});

// Zoom
container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const zoom = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const newScale = Math.min(Math.max(scale * zoom, 0.1), 10);
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Touch: pan (1 finger) and pinch-to-zoom (2 fingers)
let touchState = null;
container.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchState = { type: 'pan', startX: e.touches[0].clientX, startY: e.touches[0].clientY, panStartX: panX, panStartY: panY };
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    touchState = { type: 'pinch', dist: Math.hypot(dx, dy), startScale: scale, mx, my, panStartX: panX, panStartY: panY };
  }
  e.preventDefault();
}, { passive: false });

container.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!touchState) return;
  if (touchState.type === 'pan' && e.touches.length === 1) {
    panX = touchState.panStartX + (e.touches[0].clientX - touchState.startX);
    panY = touchState.panStartY + (e.touches[0].clientY - touchState.startY);
    applyTransform();
  } else if (touchState.type === 'pinch' && e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const zoom = dist / touchState.dist;
    const newScale = Math.min(Math.max(touchState.startScale * zoom, 0.1), 10);
    const rect = container.getBoundingClientRect();
    const mx = touchState.mx - rect.left;
    const my = touchState.my - rect.top;
    panX = mx - (mx - touchState.panStartX) * (newScale / touchState.startScale);
    panY = my - (my - touchState.panStartY) * (newScale / touchState.startScale);
    scale = newScale;
    applyTransform();
  }
}, { passive: false });

container.addEventListener('touchend', (e) => {
  if (e.touches.length === 0 && touchState?.type === 'pan') {
    const dx = Math.abs(panX - touchState.panStartX);
    const dy = Math.abs(panY - touchState.panStartY);
    if (dx < 4 && dy < 4) {
      handleMapClick({ clientX: touchState.startX, clientY: touchState.startY });
    }
  }
  touchState = null;
});

// Prevent browser zoom from any stray gestures on the page
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// Map click — simple, no delays
function handleMapClick(e) {
  const [rx, ry] = screenToImage(e.clientX, e.clientY);
  if (rx < 0 || rx > 1 || ry < 0 || ry > 1) return;

  if (mode === 'legend') {
    if (selectedLegendIdx >= 0) {
      const entry = data.legend[selectedLegendIdx];
      if (!entry.box) {
        // Create a default box at the click location
        entry.box = [rx, ry, rx + 0.12, ry + 0.012];
      }
      renderSidebar();
      renderOverlays();
    }
    return;
  }

  if (mode === 'point') {
    if (currentPlaceIdx >= allPlaces.length) return;
    const entry = allPlaces[currentPlaceIdx];
    entry.place.x = rx;
    entry.place.y = ry;
    currentPlaceIdx++;
    while (currentPlaceIdx < allPlaces.length && allPlaces[currentPlaceIdx].place.x !== undefined) {
      currentPlaceIdx++;
    }
    renderSidebar();
    renderOverlays();
    updateStatus();
  } else if (isEditing()) {
    // Add point to current polygon
    polyPoints.push([rx, ry]);
    renderOverlays();
    updateStatus();
  }
}

// Render markers and polygons
function renderOverlays() {
  if (!data) return;
  wrapper.querySelectorAll('.marker, .poly-point, .legend-corner, .legend-edge, .legend-move').forEach(el => el.remove());

  // Place markers
  allPlaces.forEach(({ place }) => {
    if (place.x === undefined) return;
    const m = document.createElement('div');
    m.className = 'marker';
    m.style.left = (place.x * IMG_W) + 'px';
    m.style.top = (place.y * IMG_H) + 'px';
    m.textContent = place.id;
    wrapper.appendChild(m);
  });

  // SVG polygons
  polyOverlay.innerHTML = '';

  // All saved district polygons (skip the one being edited)
  data.districts.forEach((d, di) => {
    if (!d.polygon) return;
    if (di === editingDistrictIdx) return;
    const pts = d.polygon.map(([x, y]) => `${x * IMG_W},${y * IMG_H}`).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pts);
    polyOverlay.appendChild(poly);
  });

  // Active editing polygon
  if (isEditing() && polyPoints.length > 0) {
    // Draggable dots
    polyPoints.forEach(([x, y], i) => {
      const dot = document.createElement('div');
      dot.className = 'poly-point';
      dot.dataset.idx = i;
      dot.style.left = (x * IMG_W) + 'px';
      dot.style.top = (y * IMG_H) + 'px';
      wrapper.appendChild(dot);
    });

    const pts = polyPoints.map(([x, y]) => `${x * IMG_W},${y * IMG_H}`).join(' ');
    if (polyPoints.length >= 3) {
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      poly.setAttribute('points', pts);
      poly.classList.add('active-poly');
      polyOverlay.appendChild(poly);
    } else if (polyPoints.length > 1) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      line.setAttribute('points', pts);
      polyOverlay.appendChild(line);
    }
  }

  // Legend overlays
  if (mode === 'legend' && data && data.legend) {
    data.legend.forEach((entry, idx) => {
      if (!entry.box) return;
      const [bx1, by1, bx2, by2] = entry.box;
      const px1 = bx1 * IMG_W, py1 = by1 * IMG_H;
      const px2 = bx2 * IMG_W, py2 = by2 * IMG_H;
      const isSelected = idx === selectedLegendIdx;
      const color = entry.type === 'district' ? 'rgba(80, 180, 255,' : 'rgba(248, 197, 108,';

      // Box outline
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', Math.min(px1, px2));
      rect.setAttribute('y', Math.min(py1, py2));
      rect.setAttribute('width', Math.abs(px2 - px1));
      rect.setAttribute('height', Math.abs(py2 - py1));
      rect.setAttribute('fill', color + (isSelected ? '0.15)' : '0.08)'));
      rect.setAttribute('stroke', color + (isSelected ? '1)' : '0.8)'));
      rect.setAttribute('stroke-width', isSelected ? '3' : '2');
      polyOverlay.appendChild(rect);

      // Bottom underline (what renders on the real map)
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', px1);
      line.setAttribute('y1', py2);
      line.setAttribute('x2', px2);
      line.setAttribute('y2', py2);
      line.setAttribute('stroke', color + '1)');
      line.setAttribute('stroke-width', isSelected ? '4' : '2');
      polyOverlay.appendChild(line);

      // Draggable corners + move handle for selected entry
      if (isSelected) {
        // Move handle (transparent div over the box)
        const moveDiv = document.createElement('div');
        moveDiv.className = 'legend-move';
        moveDiv.dataset.action = 'move';
        moveDiv.style.left = Math.min(px1, px2) + 'px';
        moveDiv.style.top = Math.min(py1, py2) + 'px';
        moveDiv.style.width = Math.abs(px2 - px1) + 'px';
        moveDiv.style.height = Math.abs(py2 - py1) + 'px';
        wrapper.appendChild(moveDiv);

        // 4 edge handles
        const minX = Math.min(px1, px2), maxX = Math.max(px1, px2);
        const minY = Math.min(py1, py2), maxY = Math.max(py1, py2);
        const w = maxX - minX, h = maxY - minY;
        [
          ['top', minX, minY, w, null],
          ['bottom', minX, maxY, w, null],
          ['left', minX, minY, null, h],
          ['right', maxX, minY, null, h],
        ].forEach(([edge, ex, ey, ew, eh]) => {
          const el = document.createElement('div');
          el.className = 'legend-edge';
          el.dataset.corner = edge;
          el.dataset.idx = idx;
          el.style.left = ex + 'px';
          el.style.top = ey + 'px';
          if (ew !== null) el.style.width = ew + 'px';
          if (eh !== null) el.style.height = eh + 'px';
          wrapper.appendChild(el);
        });

        // 4 corner dots
        [['tl', px1, py1], ['tr', px2, py1], ['bl', px1, py2], ['br', px2, py2]].forEach(([corner, cx, cy]) => {
          const dot = document.createElement('div');
          dot.className = 'legend-corner';
          dot.dataset.corner = corner;
          dot.dataset.idx = idx;
          dot.style.left = cx + 'px';
          dot.style.top = cy + 'px';
          wrapper.appendChild(dot);
        });
      }
    });
  }
}

// Mode tabs
document.querySelectorAll('#mode-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isEditing()) stopEditing(); // save current polygon first
    document.querySelectorAll('#mode-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    container.classList.toggle('editing', false);
    renderSidebar();
    renderOverlays();
    updateStatus();
  });
});

// Undo
document.getElementById('btn-undo').addEventListener('click', () => {
  if (mode === 'point') {
    for (let i = currentPlaceIdx - 1; i >= 0; i--) {
      if (allPlaces[i].place.x !== undefined) {
        delete allPlaces[i].place.x;
        delete allPlaces[i].place.y;
        currentPlaceIdx = i;
        break;
      }
    }
  } else if (isEditing()) {
    if (polyPoints.length > 0) {
      polyPoints.pop();
    }
  }
  renderSidebar();
  renderOverlays();
  updateStatus();
});

// Save to disk
document.getElementById('btn-save').addEventListener('click', () => saveData());

// Copy JSON
document.getElementById('btn-copy').addEventListener('click', () => {
  if (isEditing()) stopEditing(); // save first
  const output = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(output).then(() => {
    statusEl.textContent = 'Copied to clipboard!';
    setTimeout(updateStatus, 1500);
  });
});

// Reload from disk
document.getElementById('btn-load').addEventListener('click', () => reloadFromDisk());
</script>
</body>
</html>
